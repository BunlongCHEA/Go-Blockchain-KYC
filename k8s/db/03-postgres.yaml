# ============================================================
# PostgreSQL - Centralized Database Management
# ============================================================
# This file contains ALL postgres-related resources:
#   1. StatefulSet       — PostgreSQL database
#   2. Secret            — Database credentials
#   3. PVC               — Persistent storage
#   4. Service           — Internal access to PostgreSQL
#   5. Exporter Deployment — Metrics bridge for Prometheus
#   6. Exporter Service  — Exposes exporter metrics
#   7. NetworkPolicy     — PostgreSQL pod network rules
#   8. NetworkPolicy     — Exporter pod network rules
# ============================================================

# Deployment for PostgreSQL with 3 replicas
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-v17
  namespace: kyc-blockchain
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    version: "17"
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: postgres
        tier: database
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine  # Latest stable PostgreSQL
          ports:
          - containerPort: 5432
            name: postgres-port
          env:
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_USER
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_PASSWORD
          - name: POSTGRES_DB
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_DB
          - name: PGDATA
            value: /var/lib/postgresql/data/pgdata
          volumeMounts:
          - name: postgres-storage
            mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
              - pg_isready
              - -U
              - postgres
              - -d
              - kyc_blockchain
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
              - pg_isready
              - -U
              - postgres
              - -d
              - kyc_blockchain
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      # securityContext:
      #   runAsUser: 999
      #   runAsGroup: 999
      #   fsGroup: 999

---
# Secret for PostgreSQL credentials
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: kyc-blockchain
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
type: Opaque
data:
  # postgres (base64 encoded)
  POSTGRES_USER: cG9zdGdyZXM=
  # strongpassword123 (base64 encoded)
  POSTGRES_PASSWORD: c3Ryb25ncGFzc3dvcmQxMjM=
  # kyc_blockchain (base64 encoded)
  POSTGRES_DB: a3ljX2Jsb2NrY2hhaW4=

---
# PersistentVolumeClaim for PostgreSQL data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: kyc-blockchain
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path  # do-block-storage on DigitalOcean - standard-rwo on GKE - local-path on k3s default storage
  resources:
    requests:
      storage: 10Gi

---
# Service for PostgreSQL
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: kyc-blockchain
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    service-type: database
spec:
  type: NodePort  # ClusterIP - LoadBalancer - NodePort
  # clusterIP: None  # Headless service for StatefulSet
  ports:
  - port: 5432
    targetPort: 5432
    nodePort: 30432 # Access via <External-IP>:30432
    protocol: TCP
    name: postgres
  selector:
    app: postgres

---
# ============================================================
# Deployment - PostgreSQL Exporter (Prometheus Metrics Bridge)
# ============================================================
# HOW IT WORKS:
#   postgres-exporter connects to PostgreSQL via SQL,
#   collects database stats (connections, locks, replication, etc.),
#   and exposes them as Prometheus metrics at :9187/metrics.
#
# DATA FLOW:
#   PostgreSQL ←(SQL)← postgres-exporter →(:9187/metrics)→ Prometheus
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: kyc-blockchain
  labels:
    app.kubernetes.io/name: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.16.0
          ports:
            - containerPort: 9187
              name: pg-metrics
              protocol: TCP
          env:
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            # "postgres-service" must match the Service name above
            - name: DATA_SOURCE_URI
              value: "postgres-service:5432/kyc_blockchain?sslmode=disable"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: pg-metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: pg-metrics
            initialDelaySeconds: 10
            periodSeconds: 30

---
# Service for postgres-exporter (Prometheus scrapes this)
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter-service
  namespace: kyc-blockchain
  labels:
    app.kubernetes.io/name: postgres-exporter
spec:
  type: ClusterIP
  ports:
    - port: 9187
      targetPort: 9187
      protocol: TCP
      name: pg-metrics    # Must match ServiceMonitor's `port` field in 12-monitoring.yaml
  selector:
    app.kubernetes.io/name: postgres-exporter

---
# ============================================================
# NetworkPolicy - PostgreSQL Pod
# ============================================================
# CONTROLS: Who can talk TO the PostgreSQL pod
# MUST: Added both "app" and "app.kubernetes.io/name" labels
#      to match the actual pod labels on the StatefulSet
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: kyc-blockchain
  labels:
    app.kubernetes.io/name: postgres
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only allow from kyc-blockchain pods
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kyc-blockchain
      ports:
        - protocol: TCP
          port: 5432
    # Allow from postgres-exporter (it needs to query PostgreSQL)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres-exporter
      ports:
        - protocol: TCP
          port: 5432
    # Allow external access via NodePort
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 5432
  egress:
    # Allow all outbound traffic for PostgreSQL operations
    # - {}
    # Allow DNS only
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

---
# ============================================================
# NetworkPolicy - PostgreSQL Exporter Pod
# ============================================================
# CONTROLS: Who can talk TO/FROM the exporter pod
#
# TRAFFIC FLOW:
#   Prometheus (monitoring ns) →(:9187)→ exporter →(:5432)→ PostgreSQL
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-exporter-network-policy
  namespace: kyc-blockchain
  labels:
    app.kubernetes.io/name: postgres-exporter
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus to scrape metrics on port 9187
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9187
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Allow connection to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432