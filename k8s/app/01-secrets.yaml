apiVersion: v1
kind: Secret
metadata:
  name: kyc-blockchain-secrets
  namespace: kyc-blockchain
  labels:
    app.kubernetes.io/name: kyc-blockchain
type: Opaque
stringData:
  # Database credentials
  # DB_PASSWORD: "your-secure-postgres-password-here"
  
  # JWT Secret (generate with: openssl rand -base64 64)
  # jwt-secret-key-at-least-64-characters-long
  JWT_SECRET: "cGVvcGxlaXJvbm1hbnVmYWN0dXJpbmdtZW1iZXJsaWVoYXBwaWx5dGFza2NvdWxkYnI="
  
  # Encryption Key (must be exactly 32 characters for AES-256)
  # 32-byte-encryption-key
  ENCRYPTION_KEY: "b2238066b2001667869629d24a9f5fd4"
  
  # Verification Provider Secrets
  DIDIT_CLIENT_SECRET: ""
  ONFIDO_API_KEY: ""
  TRULIOO_API_KEY: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: kyc-blockchain-tls
  namespace: kyc-blockchain
  labels:
    app.kubernetes.io/name: kyc-blockchain
type: kubernetes.io/tls
data:
  # Base64 encoded TLS certificate and key
  # Generate with: kubectl create secret tls kyc-blockchain-tls --cert=tls.crt --key=tls.key -n kyc-blockchain --dry-run=client -o yaml
  tls.crt: ""
  tls.key: ""
  ## OR
  # Base64 encoded Cloudflare Origin Certificate
  # To generate: cat tls.crt | base64 -w 0
  # tls.crt: ""  # Base64 encoded certificate
  # tls.key: ""  # Base64 encoded private key

---
# ✅ ACTIVATED: Postgres credentials Secret
# Replace POSTGRES_PASSWORD value before applying.
# Recommended: use `kubectl create secret` or Sealed Secrets — never commit real values.
# To generate a strong password:
#   openssl rand -base64 32
# To apply manually (bypassing GitOps for the password):
#   kubectl create secret generic postgres-secret \
#     --from-literal=POSTGRES_USER=postgres \
#     --from-literal=POSTGRES_PASSWORD='<your-strong-password>' \
#     --from-literal=POSTGRES_DB=kyc_blockchain \
#     -n kyc-blockchain
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: kyc-blockchain
  labels:
    app.kubernetes.io/name: postgres
type: Opaque
# data must be base64 encoded, but stringData allows us to input plain text and it will handle encoding automatically.
stringData:
  # postgres (base64 encoded) => cG9zdGdyZXM=
  POSTGRES_USER: "postgres"
  # strongpassword123 (base64 encoded) => c3Ryb25ncGFzc3dvcmQxMjM=
  POSTGRES_PASSWORD: "strongpassword123"
  # kyc_blockchain (base64 encoded) => a3ljX2Jsb2NrY2hhaW4=
  POSTGRES_DB: "kyc_blockchain"